name: Generate Release
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'sequence-toolbox/SeQUeNCe'
    permissions:
      contents: read
    steps:
      - name: Create App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout Master
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
          token: ${{ steps.generate-token.outputs.token }}
          ref: master
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --only-group release
      - name: Stamp and release
        run: |
          uv run semantic-release -v version --skip-build --no-commit --no-tag --no-changelog
          uv lock --upgrade-package sequence
          git add uv.lock
          uv run semantic-release -v version
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GIT_COMMIT_AUTHOR: "sequence-release-bot[bot] <ID+sequence-release-bot[bot]@users.noreply.github.com>"